<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sélection région — YawREC</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: transparent;
      cursor: crosshair;
      user-select: none;
    }
    canvas { position: absolute; top: 0; left: 0; }

    #hint {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
      color: rgba(255,255,255,0.6);
      font-size: 15px;
      line-height: 1.8;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }
    #hint small { font-size: 11px; color: rgba(255,255,255,0.35); }

    #toolbar {
      position: absolute;
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(14,14,16,0.96);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 6px;
      padding: 6px 10px;
      z-index: 10;
      font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
    }
    #toolbar.visible { display: flex; }
    #dims-label {
      font-size: 11px;
      color: #999;
      font-family: ui-monospace, "Cascadia Mono", monospace;
      min-width: 88px;
    }
    .tb-btn {
      padding: 3px 12px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.06);
      color: #f0f0f0;
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
      transition: background 100ms;
    }
    .tb-btn:hover { background: rgba(255,255,255,0.12); }
    .tb-btn.primary {
      border-color: rgba(96,165,250,0.35);
      background: rgba(96,165,250,0.14);
      color: #60a5fa;
    }
    .tb-btn.primary:hover { background: rgba(96,165,250,0.24); }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hint">
    Cliquez et faites glisser pour sélectionner une région<br>
    <small>Échap pour annuler &nbsp;·&nbsp; Entrée pour confirmer</small>
  </div>
  <div id="toolbar">
    <span id="dims-label">0 × 0</span>
    <button class="tb-btn" id="btn-cancel">Annuler</button>
    <button class="tb-btn primary" id="btn-confirm">Confirmer</button>
  </div>
  <script type="module" src="/src/region-picker.js"></script>
</body>
</html>
