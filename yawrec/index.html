<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YawREC</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>

  <!-- ============================================================
       FENÊTRE YAWREC — Windows 11
       L'attribut data-tauri-drag-region rend la titlebar déplaçable.
       ============================================================ -->
  <div class="win-window" role="application" aria-label="YawREC enregistreur d'écran">

    <!-- ---------- Barre de titre ---------- -->
    <div class="win-titlebar" data-tauri-drag-region>

      <div class="title" data-tauri-drag-region>
        <svg class="logo" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1" opacity="0.35"/>
          <path d="M4 4.5 L8 8.5 L12 4.5 M8 8.5 L8 12"
                stroke="currentColor" stroke-width="1.4"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="rec-dot" id="rec-dot-titlebar" aria-hidden="true"></span>
        <span>YawREC</span>
      </div>

      <div class="win-sysbtns">
        <button class="win-sysbtn" id="btn-minimize" aria-label="Réduire">
          <svg viewBox="0 0 10 10"><path d="M0 5 H10" stroke="currentColor" stroke-width="1"/></svg>
        </button>
        <button class="win-sysbtn" id="btn-maximize" aria-label="Agrandir">
          <svg viewBox="0 0 10 10" fill="none"><rect x="0.5" y="0.5" width="9" height="9" stroke="currentColor"/></svg>
        </button>
        <button class="win-sysbtn close" id="btn-close" aria-label="Fermer">
          <svg viewBox="0 0 10 10"><path d="M0 0 L10 10 M10 0 L0 10" stroke="currentColor" stroke-width="1"/></svg>
        </button>
      </div>
    </div>

    <!-- ---------- Corps ---------- -->
    <div class="win-body">

      <!-- Zone 1 : Timer (alimenté par events Rust 'recorder://tick') -->
      <div class="win-zone">
        <div class="stack">
          <div class="win-timer">
            <div class="lcd" id="timer-text">00:00:00</div>
          </div>
          <div class="lbl" id="size-text">0 B</div>
        </div>
      </div>

      <!-- Zone 2 : Audio -->
      <div class="win-zone">
        <div class="stack" tabindex="0" aria-label="Source audio" id="audio-control">
          <div class="row">
            <svg style="width:26px;height:26px;color:#fff;" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="9" y="2" width="6" height="12" rx="3"/>
              <path d="M5 11a7 7 0 0 0 14 0"/>
              <path d="M12 18v3"/>
              <path d="M9 21h6"/>
            </svg>
            <svg class="caret" viewBox="0 0 10 10" fill="none" stroke="currentColor"
                 stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M2 4 L5 7 L8 4"/>
            </svg>
            <div class="vu" aria-hidden="true">
              <span class="bar b1"></span>
              <span class="bar b2"></span>
              <span class="bar b3"></span>
            </div>
          </div>
          <div class="lbl">Son</div>
        </div>
      </div>

      <!-- Zone 3 : Webcam -->
      <div class="win-zone">
        <div class="stack" tabindex="0" aria-label="Source webcam" id="webcam-control">
          <div class="row">
            <div class="cam-icon" aria-hidden="true"></div>
            <svg class="caret" viewBox="0 0 10 10" fill="none" stroke="currentColor"
                 stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M2 4 L5 7 L8 4"/>
            </svg>
          </div>
          <div class="lbl">Webcam</div>
        </div>
      </div>

      <!-- Zone 4 : Mode de capture -->
      <div class="win-zone">
        <div class="stack" aria-label="Mode de capture">
          <div class="row">
            <div class="mode-seg" role="tablist" id="mode-seg">
              <button class="active" role="tab" data-mode="fullscreen" aria-label="Écran complet">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                     stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="5" width="18" height="12" rx="2"/>
                  <path d="M8 21h8"/><path d="M12 17v4"/>
                </svg>
              </button>
              <button role="tab" data-mode="window" aria-label="Fenêtre">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                     stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="4" width="18" height="16" rx="2"/>
                  <path d="M3 8h18"/>
                </svg>
              </button>
              <button role="tab" data-mode="region" aria-label="Région personnalisée">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                     stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="3 3">
                  <rect x="4" y="5" width="16" height="14" rx="1"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="lbl">Capture</div>
        </div>
      </div>

      <!-- Zone 5 : Bouton REC + Pause -->
      <div class="win-zone zone-rec">
        <button class="win-pause" id="btn-pause" aria-label="Pause / Reprendre" title="Pause (Ctrl+Shift+P)">
          <svg id="icon-pause" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <rect x="3" y="2" width="3" height="12" rx="1"/>
            <rect x="10" y="2" width="3" height="12" rx="1"/>
          </svg>
          <svg id="icon-resume" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true" style="display:none">
            <path d="M4 2 L14 8 L4 14 Z"/>
          </svg>
        </button>
        <button class="win-rec" id="btn-rec" aria-label="Démarrer l'enregistrement"></button>
      </div>

      <!-- ============================================================
           POPOVERS — overlays absolus sur .win-body
           ============================================================ -->

      <!-- Popover Audio -->
      <div class="popover" id="popover-audio" aria-hidden="true">
        <div class="pop-header">
          <span>Son</span>
          <button class="pop-close" data-close="popover-audio" aria-label="Fermer">✕</button>
        </div>
        <div class="pop-row">
          <span class="pop-label">🎤 Microphone</span>
          <label class="toggle" title="Activer / désactiver le micro">
            <input type="checkbox" id="chk-mic" checked>
            <span class="track"></span>
          </label>
        </div>
        <div class="pop-devices" id="mic-devices"></div>
        <div class="pop-row gain-row" id="mic-gain-row">
          <span class="pop-label">Gain</span>
          <div class="gain-ctrl">
            <input type="range" id="mic-gain-slider" min="0" max="200" value="100" step="5" aria-label="Gain microphone">
            <span class="gain-label" id="mic-gain-label">0 dB</span>
          </div>
        </div>
        <div class="pop-sep"></div>
        <div class="pop-row">
          <span class="pop-label">🔊 Son système (loopback)</span>
          <label class="toggle" title="Enregistrer le son de l'ordinateur">
            <input type="checkbox" id="chk-loopback">
            <span class="track"></span>
          </label>
        </div>
      </div>

      <!-- Popover Webcam -->
      <div class="popover" id="popover-webcam" aria-hidden="true">
        <div class="pop-header">
          <span>Webcam</span>
          <button class="pop-close" data-close="popover-webcam" aria-label="Fermer">✕</button>
        </div>
        <div class="pop-row">
          <span class="pop-label">Activer la webcam (PiP)</span>
          <label class="toggle" title="Incrustation webcam">
            <input type="checkbox" id="chk-webcam">
            <span class="track"></span>
          </label>
        </div>
        <div class="pop-devices" id="webcam-devices"></div>
        <div class="pop-sep pip-pos-ctrl" id="pip-pos-sep" style="display:none"></div>
        <div class="pop-row pip-pos-ctrl" id="pip-pos-row" style="display:none">
          <span class="pop-label">Position de l'incrustation</span>
        </div>
        <div class="pip-grid pip-pos-ctrl" id="pip-pos-grid" style="display:none" role="group" aria-label="Position de l'incrustation">
          <button class="pip-corner" data-pos="top_left"     aria-label="Haut gauche"  aria-pressed="false" title="Haut gauche">↖</button>
          <button class="pip-corner" data-pos="top_right"    aria-label="Haut droite"  aria-pressed="false" title="Haut droite">↗</button>
          <button class="pip-corner" data-pos="bottom_left"  aria-label="Bas gauche"   aria-pressed="false" title="Bas gauche">↙</button>
          <button class="pip-corner" data-pos="bottom_right" aria-label="Bas droite"   aria-pressed="false" title="Bas droite">↘</button>
        </div>
      </div>

      <!-- Popover Screen (multi-écran) -->
      <div class="popover" id="popover-screen" aria-hidden="true">
        <div class="pop-header">
          <span>Capture écran</span>
          <button class="pop-close" data-close="popover-screen" aria-label="Fermer">✕</button>
        </div>
        <div class="pop-devices" id="screen-devices"></div>
      </div>

      <!-- Popover Window (D6) -->
      <div class="popover" id="popover-window" aria-hidden="true">
        <div class="pop-header">
          <span>Capture fenêtre</span>
          <button class="pop-close" data-close="popover-window" aria-label="Fermer">✕</button>
        </div>
        <div class="pop-devices" id="window-devices"></div>
      </div>

    </div>

    <!-- ---------- Arrêt automatique (popover flottant hors .win-body) ---------- -->
    <div id="popover-autostop" aria-hidden="true">
      <div class="pop-header">
        <span>Arrêt automatique</span>
        <button class="pop-close" id="autostop-close-btn" aria-label="Fermer">✕</button>
      </div>
      <div class="as-presets">
        <button class="as-preset" data-secs="0">Off</button>
        <button class="as-preset" data-secs="300">5 min</button>
        <button class="as-preset" data-secs="900">15 min</button>
        <button class="as-preset" data-secs="1800">30 min</button>
        <button class="as-preset" data-secs="3600">1 h</button>
      </div>
      <div class="as-custom-row">
        <span class="pop-label">Personnalisé</span>
        <input type="number" id="autostop-custom-min" min="1" max="999" placeholder="min">
        <span class="pop-label">min</span>
      </div>
    </div>

    <!-- ---------- Pied de page ---------- -->
    <div class="win-footer">
      <span class="ft-item" id="autostop-item" title="Configurer l'arrêt automatique">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="13" r="8"/>
          <path d="M12 9 v4 l2.5 1.5"/>
          <path d="M9 2 h6"/>
        </svg>
        <span id="autostop-label">Arrêt automatique</span>
      </span>
      <span class="ft-item" id="frame-count-item" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M8 4v16"/>
          <path d="M16 4v16"/>
        </svg>
        <span id="frame-count-text">0 frames</span>
      </span>
      <span class="ft-item" id="encoder-pill">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="6" width="14" height="12" rx="2"/>
          <path d="M17 10 l4 -2 v8 l-4 -2 z"/>
        </svg>
        <span id="encoder-text">MP4 — 1080p</span>
      </span>
      <span class="ft-item" id="output-path-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        </svg>
        <span id="output-path-text">C:\Users\…\Vidéos\YawREC</span>
      </span>

      <span class="ft-spacer"></span>

      <span class="ft-item">
        <span>Démarrer</span>
        <span class="kbd">Ctrl</span>
        <span class="kbd">Shift</span>
        <span class="kbd">R</span>
      </span>
    </div>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
